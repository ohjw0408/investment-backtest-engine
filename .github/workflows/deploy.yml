name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  # ── 테스트 게이트 (출시완성도 C-3) ─────────────────────────────
  # 깨진 코드가 그대로 prod 배포되는 것을 차단한다.
  # 서브셋 = DB-독립 테스트만 (price_daily.db 등 런타임 DB는 CI에 없음).
  # 데이터 의존 회귀는 기존 규칙대로 로컬 타겟 테스트 + 라이브 probe.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax gate (compileall)
        run: python -m compileall -q app.py config.py tasks.py celery_app.py modules scripts

      - name: Golden master (엔진 결과 불변)
        run: python scripts/perf_golden.py check
        env:
          PYTHONIOENCODING: utf-8

      # 선정 기준: data/price_cache·data/private·data/meta/index_master.db 전부 없는
      # 상태에서 PASS (검증 절차 = tests/README.md). cash_and_dividend·dca_engine은
      # USD/KRW(index_master) 의존이라 제외 — 로컬 타겟 테스트로 커버.
      - name: Engine unit tests (DB-independent subset)
        run: >
          python -m pytest -q
          tests/test_engine_integrity.py
          tests/test_basic_simulation.py
          tests/test_engine_dca_simulation.py
          tests/test_band_dca_dividend.py
          tests/test_d4_fee_logic.py
          tests/test_saved_portfolios.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Alert runner (script-style)
        run: python tests/test_alert_runner.py
        env:
          PYTHONIOENCODING: utf-8

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.105.84.213
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /root/investment-backtest-engine
            # 서버를 origin/main과 정확히 일치시킨다(merge/pull 아님).
            # git pull은 divergent(force-push 후) 시 reconcile 전략 부재로 실패하므로
            # fetch + reset --hard로 origin을 단일 진실로 삼는다. 런타임 DB는 gitignore(untracked)라
            # reset 영향 없음.
            git fetch origin main
            git reset --hard origin/main
            # 새 의존성 설치(멱등 — 변경 없으면 빠름). 누락 시 import 실패로 앱 다운 방지.
            venv/bin/pip install -q -r requirements.txt
            # 거시지표 최초 적재(테이블 비었을 때만, 멱등). 키는 서버 보유. 실패해도 배포 계속.
            venv/bin/python -m modules.macro_loader --ensure || true
            cp deploy/domino-celery-beat.service /etc/systemd/system/
            cp deploy/moneymilestone-backup.cron /etc/cron.d/moneymilestone-backup
            systemctl daemon-reload
            systemctl enable domino-celery-beat
            systemctl restart domino domino-celery domino-celery-beat
            sleep 2
            systemctl is-active domino domino-celery domino-celery-beat
