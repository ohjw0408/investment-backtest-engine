{% extends "base.html" %}
{% block title %}홈 — Money Milestone{% endblock %}

{% block head %}
<style>
/* ═══ HOME — 코인베이스 룩 (이 페이지 전용 오버라이드, block head=홈만 렌더) ═══ */
.main-content { font-family: var(--font-sans); color: var(--ds-ink); background: var(--ds-canvas);
  gap: var(--sp-lg); padding: var(--sp-xl); }

/* 카드 공통 — 헤어라인 + 24px + 그림자 제거 */
.portfolio-card, .market-card, .asset-card {
  background: var(--ds-canvas); border: 1px solid var(--ds-hairline);
  border-radius: var(--r-xl); box-shadow: none; }
.portfolio-card:hover, .market-card:hover, .asset-card:hover { box-shadow: var(--ds-shadow); }

/* 포트폴리오 */
.portfolio-header { padding: var(--sp-lg) var(--sp-lg) 0; }
.card-label { font-size: var(--fs-cap); font-weight: 500; color: var(--ds-muted);
  letter-spacing: 0; text-transform: none; }
.portfolio-amount { font-family: var(--font-mono); font-size: 40px; font-weight: 500;
  letter-spacing: -1.5px; color: var(--ds-ink); }
.portfolio-change { font-family: var(--font-sans); font-size: var(--fs-sm); font-weight: 600; }
.portfolio-change.up { color: var(--up); }
.portfolio-change.down { color: var(--down); }

/* 기간 pill */
.period-btn { background: transparent; border: 1px solid var(--ds-hairline); color: var(--ds-body);
  border-radius: var(--r-pill); padding: 7px 14px; font-family: var(--font-sans); font-weight: 600; }
.period-btn:hover { background: transparent; border-color: var(--ds-muted); color: var(--ds-ink); }
.period-btn.active { background: var(--ds-ink); color: var(--ds-canvas); border-color: var(--ds-ink); }

/* 위젯 헤더 — 파랑 → 흰색 */
.market-header { background: var(--ds-canvas); border-bottom: 1px solid var(--ds-hairline);
  padding: var(--sp-base) var(--sp-lg); }
.market-title { color: var(--ds-ink); font-weight: 600; font-size: var(--fs-title); }
.star { color: var(--gold-acc); }
.widget-cog { color: var(--ds-muted); }

/* 위젯 탭 */
.widget-tabs { border-bottom-color: var(--ds-hairline); }
.widget-tab { background: transparent; border-color: var(--ds-hairline); color: var(--ds-body);
  border-radius: var(--r-pill); }
.widget-tab.active { background: var(--ds-ink); color: var(--ds-canvas); border-color: var(--ds-ink); }

/* 위젯 그리드 */
.market-item { border-right: 1px solid var(--ds-hairline); border-bottom: 1px solid var(--ds-hairline);
  padding: var(--sp-base) var(--sp-md); }
.market-item:hover { background: var(--ds-soft); }
.market-name { font-size: var(--fs-sm); font-weight: 600; color: var(--ds-ink); }
.market-value { font-family: var(--font-mono); font-size: 18px; font-weight: 500;
  letter-spacing: 0; color: var(--ds-ink); }
.market-change.up { color: var(--up); }
.market-change.down { color: var(--down); }
.wdot { background: var(--ds-hairline); }
.wdot.active { background: var(--brand); }

/* 우측 패널 자산 */
.asset-header { border-bottom-color: var(--ds-hairline); padding: var(--sp-lg) var(--sp-lg) var(--sp-sm); }
.asset-title { font-weight: 600; font-size: var(--fs-title); color: var(--ds-ink); }
.asset-arrow { color: var(--ds-muted); }
.asset-item { padding: 12px var(--sp-lg); }
.asset-item:hover { background: var(--ds-soft); }
.asset-dot { border-radius: var(--r-full); }
.asset-name { font-size: var(--fs-sm); font-weight: 600; color: var(--ds-ink); }
.asset-info .asset-change { color: var(--ds-muted); font-family: var(--font-mono); }
.asset-bar-wrap { border-top-color: var(--ds-hairline); }
.asset-bar-label { color: var(--ds-muted); font-weight: 600; }
.bar-seg { border-radius: var(--r-xs); }
.bar-col-label { color: var(--ds-muted); }
</style>
{% endblock %}

{% block content %}
<div class="dashboard-grid">

  <!-- ===== 포트폴리오 카드 ===== -->
  <div class="card portfolio-card">
    <div class="portfolio-header">
      <div>
        <div class="card-label">내 포트폴리오</div>
        <div class="portfolio-amount">
          <span id="portfolioValue">***,***,***원</span>
          <span class="portfolio-change up" id="portfolioChange">(+1.8%)</span>
        </div>
      </div>
      <div class="period-selector">
        <button class="period-btn active" data-period="1m">1개월</button>
        <button class="period-btn" data-period="3m">3개월</button>
        <button class="period-btn" data-period="1y">1년</button>
        <button class="period-btn" data-period="all">전체</button>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="portfolioChart"></canvas>
    </div>
  </div>

  <!-- ===== 홈 위젯 (시장지수 / 관심목록) ===== -->
  <div class="card market-card" id="widgetCard">
    <div class="market-header">
      <span class="star">★</span>
      <span class="market-title" id="widgetTitle">시장 지수</span>
      <span id="marketRefreshTime" style="font-size:0.72rem;color:var(--ds-muted);margin-left:auto;margin-right:8px;"></span>
      <button id="widgetRefreshBtn" class="widget-cog" title="현재 시세로 새로고침" onclick="refreshWidgets()" style="background:none;border:none;margin-right:6px;">🔄</button>
      <a href="/settings" class="widget-cog" title="홈 화면 설정">⚙</a>
    </div>
    <div class="widget-tabs" id="widgetTabs" style="display:none;"></div>
    <div class="widget-body" id="widgetBody">
      <div class="market-loading">데이터 불러오는 중...</div>
    </div>
    <div class="widget-dots" id="widgetDots"></div>
    <div style="font-size:0.68rem;color:var(--text-muted);padding:7px 14px;border-top:1px solid var(--border);">⚠ 시세 약 15분 지연 — 새로고침해도 실시간과 다를 수 있습니다</div>
  </div>

</div>

<!-- ===== 우측 패널 ===== -->
<div class="right-panel">
  <div class="card asset-card">
    <div class="asset-header">
      <span class="asset-title">자산군별 비교</span>
      <span class="asset-arrow">›</span>
    </div>
    <div id="assetList" class="asset-list"></div>
    <div class="asset-bar-wrap">
      <div class="asset-bar-label">금액</div>
      <div class="stacked-bar" id="stackedBar"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  loadPortfolio();
  loadWidgets();
  loadAssets();
  setInterval(loadWidgets, 5 * 60 * 1000);
  let _wrt;
  window.addEventListener('resize', () => { clearTimeout(_wrt); _wrt = setTimeout(renderWidgets, 200); });
  setInterval(() => {
    loadPortfolio(_homePortfolioPeriod);
    loadAssets();
  }, 60 * 1000);

  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadPortfolio(btn.dataset.period);
    });
  });
});

// ── 포트폴리오 차트 ──
let portfolioChart = null;
let _portfolioData = null;
let _homeHideAmounts = true;
let _homePortfolioPeriod = '1m';

function fmtMaskedKRW(v) {
  if (_homeHideAmounts) return '***,***,***원';
  return '₩' + Math.round(v || 0).toLocaleString();
}

async function loadPortfolio(period = '1m') {
  _homePortfolioPeriod = period;
  const res = await fetch('/api/portfolio/history', { cache: 'no-store' });
  _portfolioData = await res.json();
  const data = _portfolioData;
  _homeHideAmounts = data.hide_amounts !== false;

  if (data.empty) {
    document.getElementById('portfolioValue').textContent = '—';
    document.getElementById('portfolioChange').textContent = '';
    const canvas = document.getElementById('portfolioChart');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#90A4AE';
    ctx.font = '13px Noto Sans KR';
    ctx.textAlign = 'center';
    ctx.fillText('내 자산에서 포트폴리오를 구성하면 여기에 표시됩니다.', canvas.width / 2, canvas.height / 2);
    return;
  }

  const { labels, values } = data;
  const slices = { '1m': 22, '3m': 66, '1y': 252, 'all': values.length };
  const n = slices[period] || 22;
  const slicedLabels = labels.slice(-n);
  const slicedValues = values.slice(-n);

  document.getElementById('portfolioValue').textContent = fmtMaskedKRW(slicedValues[slicedValues.length - 1] || 0);
  const periodChange = slicedValues.length > 1
    ? ((slicedValues[slicedValues.length - 1] - slicedValues[0]) / slicedValues[0] * 100).toFixed(2)
    : null;
  const changeEl = document.getElementById('portfolioChange');
  if (periodChange !== null) {
    const sign = periodChange >= 0 ? '+' : '';
    changeEl.textContent = sign + periodChange + '%';
    changeEl.className = 'portfolio-change ' + (periodChange >= 0 ? 'up' : 'down');
  } else {
    changeEl.textContent = '';
  }

  const canvas = document.getElementById('portfolioChart');
  const ctx = canvas.getContext('2d');
  const _brand = getComputedStyle(document.documentElement).getPropertyValue('--brand').trim() || '#0052ff';
  const grad = ctx.createLinearGradient(0, 0, 0, 200);
  grad.addColorStop(0, _brand + '2e');
  grad.addColorStop(1, _brand + '00');

  if (portfolioChart) portfolioChart.destroy();
  portfolioChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: slicedLabels,
      datasets: [{
        data: slicedValues,
        borderColor: _brand,
        borderWidth: 2.5,
        fill: true,
        backgroundColor: grad,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: _brand,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => fmtMaskedKRW(c.raw) } }
      },
      scales: {
        x: {
          display: true,
          ticks: { maxTicksLimit: 6, font: { size: 10 }, color: '#90A4AE' },
          grid: { display: false }
        },
        y: {
          display: true,
          ticks: {
            font: { family: 'JetBrains Mono', size: 10 },
            color: '#90A4AE',
            callback: v => _homeHideAmounts ? '***' : '₩' + (v / 1000000).toFixed(1) + 'M'
          },
          grid: { color: MM_CHART_GRID }
        }
      }
    }
  });
}

// ── 홈 위젯 (시장지수 / 관심목록) ──
let _widgets = [];
let _quoteMap = {};
let _activeWidget = 0;

function _esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

async function loadWidgets() {
  try {
    const cfg = await (await fetch('/api/home-config', { cache: 'no-store' })).json();
    _widgets = cfg.widgets || [];
    const codes = [...new Set(_widgets.flatMap(w => (w.items || []).map(i => String(i.code).toUpperCase())))];
    if (codes.length) {
      const qs = await (await fetch('/api/watchlist/quotes?codes=' + encodeURIComponent(codes.join(',')))).json();
      _quoteMap = Object.fromEntries(qs.map(q => [q.code, q]));
    }
    renderWidgets();
  } catch (e) { /* 네트워크 실패 시 무시 */ }
}

function _itemsWithQuote(w) {
  return (w.items || []).map(it => ({ ...it, q: _quoteMap[String(it.code).toUpperCase()] }));
}

// 현재 시세로 새로고침 (서버 공유 캐시 15분 floor — 더 자주 눌러도 같은 값)
async function refreshWidgets() {
  const btn = document.getElementById('widgetRefreshBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
  try { await loadWidgets(); } catch (e) {}
  if (btn) { btn.textContent = '✓'; setTimeout(() => { btn.textContent = '🔄'; btn.disabled = false; }, 1200); }
}

function renderWidgets() {
  if (!_widgets.length) return;
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  const tabs = document.getElementById('widgetTabs');
  const body = document.getElementById('widgetBody');
  const dots = document.getElementById('widgetDots');
  const title = document.getElementById('widgetTitle');
  if (_activeWidget >= _widgets.length) _activeWidget = 0;

  if (isMobile) {
    tabs.style.display = 'none';
    _renderMobile(body, dots, title);
  } else {
    dots.innerHTML = '';
    if (_widgets.length > 1) {
      tabs.style.display = '';
      tabs.innerHTML = _widgets.map((w, i) =>
        `<button class="widget-tab ${i === _activeWidget ? 'active' : ''}" data-i="${i}">${_esc(w.name)}</button>`).join('');
      tabs.querySelectorAll('.widget-tab').forEach(b =>
        b.addEventListener('click', () => { _activeWidget = +b.dataset.i; renderWidgets(); }));
    } else {
      tabs.style.display = 'none';
    }
    if (title) title.textContent = _widgets[_activeWidget].name;
    _renderGrid(_itemsWithQuote(_widgets[_activeWidget]), body);
  }
}

// 위젯 항목 클릭 이동: 포트폴리오(PF:<id>) → 상세, 일반 종목 → 종목 상세
function _widgetGo(code) {
  if (String(code).toUpperCase().startsWith('PF:')) {
    location.href = '/myportfolios/' + encodeURIComponent(String(code).split(':')[1]);
  } else {
    location.href = '/symbol/' + encodeURIComponent(code);
  }
}

// PC: 칸 그리드(.market-grid 3열) — 종목별 큰 값 + 큰 스파크라인
function _renderGrid(items, body) {
  body.innerHTML = `<div class="market-grid">${items.map((it, i) => `
    <div class="market-item" data-code="${_esc(it.code)}">
      <div class="market-name">${_esc(it.name)}</div>
      <div class="market-value">${it.q ? _esc(it.q.value) : '—'}</div>
      <div class="market-change ${it.q && it.q.up ? 'up' : 'down'}">${it.q ? (it.q.up ? '▲' : '▼') + ' ' + _esc(it.q.change) : '—'}</div>
      <canvas id="wtspark-${i}" class="sparkline" width="160" height="46"></canvas>
    </div>`).join('')}</div>`;
  body.querySelectorAll('.market-item[data-code]').forEach(el =>
    el.addEventListener('click', () => _widgetGo(el.dataset.code)));
  items.forEach((it, i) => {
    if (it.q && it.q.spark && it.q.spark.length >= 2)
      requestAnimationFrame(() => drawSparkline(`wtspark-${i}`, it.q.spark, it.q.up));
  });
}

function _renderMobile(body, dots, title) {
  // 모든 위젯을 6개씩 페이지로 평탄화 → 스와이프 시퀀스
  const pages = [];
  _widgets.forEach(w => {
    const items = _itemsWithQuote(w);
    for (let i = 0; i < items.length; i += 6) pages.push({ name: w.name, items: items.slice(i, i + 6) });
  });
  if (!pages.length) { body.innerHTML = ''; dots.innerHTML = ''; return; }

  body.innerHTML = `<div class="widget-carousel" id="widgetCarousel">${pages.map((pg, pi) => `
    <div class="widget-slide"><div class="market-grid">${pg.items.map((it, ii) => `
      <div class="market-item" data-code="${_esc(it.code)}"
           style="border-right:${ii % 2 === 0 ? '1px solid var(--border)' : 'none'};border-bottom:${ii < pg.items.length - 2 ? '1px solid var(--border)' : 'none'};">
        <div class="market-name">${_esc(it.name)}</div>
        <div class="market-value">${it.q ? _esc(it.q.value) : '—'}</div>
        <div class="market-change ${it.q && it.q.up ? 'up' : 'down'}">${it.q ? (it.q.up ? '▲' : '▼') + ' ' + _esc(it.q.change) : '—'}</div>
        <canvas id="msp-${pi}-${ii}" class="sparkline" width="100" height="36"></canvas>
      </div>`).join('')}</div></div>`).join('')}</div>`;

  dots.innerHTML = pages.map((_, i) => `<span class="wdot ${i === 0 ? 'active' : ''}"></span>`).join('');
  if (title) title.textContent = pages[0].name;

  pages.forEach((pg, pi) => pg.items.forEach((it, ii) => {
    if (it.q && it.q.spark && it.q.spark.length >= 2)
      requestAnimationFrame(() => drawSparkline(`msp-${pi}-${ii}`, it.q.spark, it.q.up));
  }));

  const car = document.getElementById('widgetCarousel');
  car.addEventListener('scroll', () => {
    const idx = Math.round(car.scrollLeft / car.clientWidth);
    dots.querySelectorAll('.wdot').forEach((d, i) => d.classList.toggle('active', i === idx));
    if (title && pages[idx]) title.textContent = pages[idx].name;
  }, { passive: true });

  body.querySelectorAll('.market-item[data-code]').forEach(el =>
    el.addEventListener('click', () => _widgetGo(el.dataset.code)));
}

// ── 자산군별 ──
async function loadAssets() {
  const res   = await fetch('/api/assets');
  const items = await res.json();

  const list = document.getElementById('assetList');
  if (!items.length) {
    list.innerHTML = '<div style="color:var(--ds-muted);font-size:13px;padding:8px 0">내 자산 탭에서 그룹을 설정하면 표시됩니다.</div>';
    document.getElementById('stackedBar').innerHTML = '';
    return;
  }

  list.innerHTML = items.map(a => `
    <div class="asset-item">
      <div class="asset-dot" style="background:${a.color}22; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;"></div>
      <div class="asset-info">
        <div class="asset-name">${a.name}</div>
        <div class="asset-change">${Math.round(a.pct * 100)}%</div>
      </div>
    </div>
  `).join('');

  const bar = document.getElementById('stackedBar');
  bar.innerHTML = '';
  const col = document.createElement('div');
  col.className = 'bar-col';
  items.forEach(a => {
    const seg = document.createElement('div');
    seg.className = 'bar-seg';
    seg.style.height = (a.pct * 130) + 'px';
    seg.style.background = a.color;
    col.appendChild(seg);
  });
  const lbl = document.createElement('div');
  lbl.className = 'bar-col-label';
  lbl.textContent = '목표';
  col.appendChild(lbl);
  bar.appendChild(col);
}
</script>
{% endblock %}
