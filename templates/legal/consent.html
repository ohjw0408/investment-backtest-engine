{% extends "base.html" %}
{% block title %}약관 동의 — Money Milestone{% endblock %}
{% block content %}
<div style="grid-column:1 / -1;max-width:480px;width:100%;margin:0 auto;padding:48px 20px;">
  <div style="background:var(--ds-canvas);border:1px solid var(--ds-hairline);border-radius:var(--r-lg);
       box-shadow:var(--ds-shadow);padding:28px 24px;">
    <h1 style="font-size:1.25rem;font-weight:800;margin:0 0 6px;color:var(--ds-ink);">서비스 이용 동의</h1>
    <p style="font-size:0.85rem;color:var(--ds-body);margin:0 0 20px;line-height:1.6;">
      Money Milestone 이용을 위해 아래 약관에 동의해주세요.</p>

    <label style="display:flex;align-items:center;gap:10px;padding:12px 0;cursor:pointer;font-size:0.9rem;">
      <input type="checkbox" id="agreeTerms" style="width:18px;height:18px;flex-shrink:0;">
      <span>(필수) <a href="/terms" target="_blank" style="color:var(--brand);">이용약관</a>에 동의합니다</span>
    </label>
    <label style="display:flex;align-items:center;gap:10px;padding:12px 0;cursor:pointer;font-size:0.9rem;
           border-top:1px solid var(--ds-hairline);">
      <input type="checkbox" id="agreePrivacy" style="width:18px;height:18px;flex-shrink:0;">
      <span>(필수) <a href="/privacy" target="_blank" style="color:var(--brand);">개인정보처리방침</a>에 동의합니다</span>
    </label>
    <label style="display:flex;align-items:flex-start;gap:10px;padding:12px 0;cursor:pointer;font-size:0.9rem;
           border-top:1px solid var(--ds-hairline);">
      <input type="checkbox" id="agreePush" style="width:18px;height:18px;flex-shrink:0;margin-top:2px;">
      <span>
        (선택) 서비스 푸시 알림 수신에 동의합니다
        <span style="display:block;margin-top:4px;font-size:0.78rem;color:var(--ds-body);line-height:1.5;">
          광고·마케팅 동의가 아닙니다. 내가 설정한 가격·신고가/신저가·리밸런싱·캘린더 알림만 보내며,
          동의하지 않아도 앱을 이용할 수 있어요.
        </span>
      </span>
    </label>

    <button id="consentBtn" onclick="submitConsent()" disabled
      style="width:100%;margin-top:20px;padding:13px;border:none;border-radius:var(--r-md);
      background:var(--brand);color:var(--on-brand);font-size:0.95rem;font-weight:700;cursor:pointer;
      opacity:0.5;transition:opacity .15s;">동의하고 시작하기</button>
    <div id="consentErr" style="margin-top:10px;font-size:0.8rem;color:var(--down);text-align:center;"></div>
  </div>
</div>
<script>
  const _t = document.getElementById('agreeTerms');
  const _p = document.getElementById('agreePrivacy');
  const _push = document.getElementById('agreePush');
  const _b = document.getElementById('consentBtn');
  function _sync() { const ok = _t.checked && _p.checked; _b.disabled = !ok; _b.style.opacity = ok ? '1' : '0.5'; }
  _t.addEventListener('change', _sync); _p.addEventListener('change', _sync);
  async function submitConsent() {
    if (!(_t.checked && _p.checked)) return;
    _b.disabled = true;
    try {
      const r = await fetch('/consent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ push_notifications: !!(_push && _push.checked) })
      });
      const j = await r.json();
      if (j.ok) {
        if (_push && _push.checked && window.mmInitPush) {
          _b.textContent = '알림 권한 확인 중…';
          try { await window.mmInitPush(true); } catch (e) {}
        }
        location.href = '/';
      }
      else { document.getElementById('consentErr').textContent = '오류가 발생했어요. 다시 시도해주세요.'; _b.disabled = false; }
    } catch (e) { document.getElementById('consentErr').textContent = '네트워크 오류. 다시 시도해주세요.'; _b.disabled = false; }
  }
</script>
{% endblock %}
