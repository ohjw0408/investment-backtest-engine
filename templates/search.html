{% extends "base.html" %}
{% block title %}종목 검색 — Money Milestone{% endblock %}

{% block head %}
<style>
.search-page { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
.search-bar {
  display: flex; align-items: center; gap: 10px;
  background: white; border: 1.5px solid var(--border);
  border-radius: 12px; padding: 10px 16px; margin-bottom: 20px;
  box-shadow: var(--shadow); transition: border-color 0.2s;
}
.search-bar:focus-within { border-color: var(--blue-bright); }
.search-bar input {
  border: none; outline: none; flex: 1;
  font-size: 1rem; font-family: inherit; color: var(--text);
  background: transparent;
}
.search-icon { font-size: 1.2rem; color: var(--text-muted); }

/* 2열 그리드 */
.results-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
@media (max-width: 560px) {
  .results-grid { grid-template-columns: 1fr; }
}

.result-card {
  background: white; border: 1.5px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
  cursor: pointer; text-decoration: none; color: var(--text);
  transition: border-color 0.15s, box-shadow 0.15s;
  display: flex; flex-direction: column; gap: 6px;
}
.result-card:hover { border-color: var(--blue-bright); box-shadow: var(--shadow); }

.card-top { display: flex; align-items: center; justify-content: space-between; }
.result-badge {
  font-size: 0.68rem; font-weight: 700;
  padding: 2px 8px; border-radius: 6px; white-space: nowrap;
}
.card-price { font-size: 0.9rem; font-weight: 700; color: var(--text); }
.card-name { font-size: 0.97rem; font-weight: 700; color: var(--text); line-height: 1.3; }
.card-code { font-size: 0.78rem; color: var(--text-muted); }
.card-change {
  font-size: 0.8rem; font-weight: 700; text-align: right;
}
.card-change.up   { color: #2E7D32; }
.card-change.down { color: #C62828; }
.card-change.flat { color: var(--text-muted); }

.search-hint { text-align: center; color: var(--text-muted); padding: 48px 0; font-size: 0.9rem; }
</style>
{% endblock %}

{% block content %}
<div class="search-page">
  <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:16px;">종목 검색</h2>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="종목명, ETF, 티커 입력..." autocomplete="off" autofocus>
  </div>
  <div id="searchResults">
    <div class="search-hint">종목명 또는 티커를 입력하세요</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function badgeColor(badge) {
  if (badge === 'KR ETF' || badge === 'KOSPI' || badge === 'KOSDAQ') return '#1976D2';
  if (badge === 'US ETF' || badge === 'NASDAQ' || badge === 'NYSE')   return '#2E7D32';
  if (badge === 'CRYPTO') return '#F57C00';
  return '#78909C';
}

function fmtPrice(price, currency) {
  if (price == null) return '—';
  if (currency === 'KRW') {
    if (price >= 10000) return '₩' + Math.round(price / 100) * 100 .toLocaleString();
    return '₩' + Math.round(price).toLocaleString();
  }
  return '$' + price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function fmtChange(pct) {
  if (pct == null) return { text: '—', cls: 'flat' };
  const sign = pct >= 0 ? '+' : '';
  return { text: sign + pct.toFixed(2) + '%', cls: pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat' };
}

const input      = document.getElementById('searchInput');
const resultsDiv = document.getElementById('searchResults');
let timer = null;

input.addEventListener('input', () => {
  const q = input.value.trim();
  if (!q) {
    resultsDiv.innerHTML = '<div class="search-hint">종목명 또는 티커를 입력하세요</div>';
    return;
  }
  clearTimeout(timer);
  resultsDiv.innerHTML = '<div class="search-hint">검색 중...</div>';
  timer = setTimeout(async () => {
    try {
      const res  = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      if (!data.length) {
        resultsDiv.innerHTML = '<div class="search-hint">검색 결과가 없습니다</div>';
        return;
      }
      const color = (b) => badgeColor(b);
      resultsDiv.innerHTML = '<div class="results-grid">' + data.map(item => {
        const chg = fmtChange(item.change_pct);
        const priceStr = fmtPrice(item.price, item.currency);
        return `
          <a class="result-card" href="/symbol/${item.code}">
            <div class="card-top">
              <span class="result-badge" style="background:${color(item.badge)}22;color:${color(item.badge)}">${item.badge}</span>
              <span class="card-price">${priceStr}</span>
            </div>
            <div class="card-name">${item.name}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span class="card-code">${item.code}${item.subtitle ? ' · ' + item.subtitle : ''}</span>
              <span class="card-change ${chg.cls}">${chg.text}</span>
            </div>
          </a>`;
      }).join('') + '</div>';
    } catch(e) {
      resultsDiv.innerHTML = '<div class="search-hint">오류가 발생했습니다</div>';
    }
  }, 250);
});
</script>
{% endblock %}
