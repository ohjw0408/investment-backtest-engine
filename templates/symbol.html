{% extends "base.html" %}
{% block title %}{{ code }} — Money Milestone{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ static_v('css/calculator.css') }}">
<style>
/* main-content 기본 grid 무력화 — symbol 페이지 전체 너비 사용 */
.main-content { display: block !important; padding: 0 !important; }
.symbol-wrap { max-width: 100%; padding: 20px 28px; }

/* 헤더 */
.symbol-header {
  display: flex; align-items: center; justify-content: space-between;
  background:var(--card); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 16px 24px; margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.symbol-header-left { display: flex; align-items: center; gap: 16px; }
.symbol-badge {
  padding: 4px 12px; border-radius: 8px;
  font-size: 0.75rem; font-weight: 700;
  background:var(--blue-pale); color:var(--blue); flex-shrink: 0;
}
.symbol-badge.kr     { background:var(--green-pale); color:var(--green); }
.symbol-badge.crypto { background:var(--gold-pale); color:var(--gold-deep); }
.symbol-name { font-size: 1.4rem; font-weight: 900; color: var(--text); }
.symbol-code { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
.symbol-header-right { text-align: right; }
.symbol-price { font-size: 2rem; font-weight: 900; color: var(--text); }
.symbol-change { font-size: 0.95rem; font-weight: 700; margin-top: 2px; }
.symbol-change.up   { color:var(--green); }
.symbol-change.down { color:var(--red); }
.symbol-date { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }

/* 2열 본문 */
.symbol-body {
  display: grid;
  grid-template-columns: 6fr 4fr;
  gap: 16px;
  align-items: start;
}

/* 차트 카드 — 높이 전체 채우기 */
.chart-card {
  display: flex;
  flex-direction: column;
}
.chart-canvas-wrap {
  height: 530px;
  position: relative;
}
.symbol-left-col {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* 오른쪽 컬럼 — 스택 전체 높이 채우기 */
.symbol-right-col {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.symbol-left-col .symbol-card + .symbol-card,
.symbol-right-col .symbol-card + .symbol-card { margin-top: 0; }
.symbol-right-col .symbol-card:last-child {
  flex: 1;
  overflow-y: auto;
}

/* 카드 */
.symbol-card {
  background:var(--card); border-radius: 14px;
  border: 1.5px solid var(--border); padding: 20px;
  box-shadow: var(--shadow);
}
.symbol-card + .symbol-card { margin-top: 16px; }
.symbol-card-title {
  font-size: 0.88rem; font-weight: 700; color: var(--text);
  margin-bottom: 14px;
}

/* 차트 카드 헤더 (제목 + 라인/캔들 토글) */
.chart-card-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.chart-card-head .symbol-card-title { margin-bottom: 0; }
.chart-type-toggle { display: flex; gap: 4px; }
.ctype-btn {
  padding: 4px 12px; border-radius: 7px;
  font-size: 0.78rem; font-weight: 600;
  border: 1.5px solid var(--border);
  background:var(--card); color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
}
.ctype-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
.ctype-btn.disabled { opacity: 0.4; cursor: not-allowed; }
.fs-btn {
  padding: 4px 10px; border-radius: 7px;
  border: 1.5px solid var(--border); background: var(--card);
  color: var(--text-muted); cursor: pointer; font-size: 0.95rem; line-height: 1;
}
.fs-btn:hover { color: var(--blue); border-color: var(--blue); }
.chart-hint { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 8px; min-height: 1em; }

/* 전체화면 — 차트 카드만 화면 채움 */
.chart-card:fullscreen { background: var(--card); padding: 24px; }
.chart-card:fullscreen .chart-canvas-wrap { height: calc(100vh - 150px); }

/* 기간 탭 */
.period-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
.period-tab {
  padding: 5px 14px; border-radius: 7px;
  font-size: 0.8rem; font-weight: 600;
  border: 1.5px solid var(--border);
  background:var(--card); color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
}
.period-tab.active { background: var(--blue); color: white; border-color: var(--blue); }

/* 지표 그리드 */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.stat-item { padding: 12px; background: var(--bg); border-radius: 10px; }
.stat-label { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 4px; }
.stat-value { font-size: 0.95rem; font-weight: 700; color: var(--text); }

/* 배당 테이블 */
.div-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.div-table th {
  background: var(--bg); padding: 7px 10px;
  color: var(--text-muted); font-weight: 600;
  text-align: left; border-bottom: 1.5px solid var(--border);
}
.div-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
.div-table tr:last-child td { border-bottom: none; }
.div-more-btn {
  width: 100%;
  margin-top: 10px;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  background: var(--bg);
  color: var(--text);
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
}
.div-more-btn:hover { border-color: var(--blue); color: var(--blue); }

.holding-list { display: flex; flex-direction: column; gap: 8px; }
.holding-row {
  display: grid; grid-template-columns: 28px minmax(58px, 74px) 1fr auto;
  align-items: center; gap: 8px; padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.holding-row:last-child { border-bottom: none; }
.holding-rank { font-size: 0.72rem; color: var(--text-muted); font-family: var(--font-mono); }
.holding-code { font-size: 0.82rem; font-weight: 800; color: var(--text); font-family: var(--font-mono); }
.holding-name { min-width: 0; font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.holding-weight { font-size: 0.82rem; font-weight: 800; color: var(--blue); font-family: var(--font-mono); }
.holding-source { margin-top: 10px; font-size: 0.72rem; color: var(--text-muted); }
.holding-pie-wrap {
  height: 300px;
  position: relative;
  margin-bottom: 12px;
}

/* 빈 상태 */
.symbol-empty {
  display: flex; align-items: center; justify-content: center;
  height: 200px; color: var(--text-muted); font-size: 0.9rem;
  border: 2px dashed var(--border); border-radius: 12px;
}

@media (max-width: 900px) {
  .symbol-wrap { padding: 14px 12px; }
  .symbol-body { grid-template-columns: 1fr; }
  .symbol-header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .symbol-header-right { text-align: left; }
  .symbol-price { font-size: 1.5rem; }
  .chart-canvas-wrap { height: 320px; }
}
</style>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
{% endblock %}

{% block content %}
<div class="symbol-wrap">
  <div id="symbolContent">
    <div class="symbol-empty">⏳ 데이터 로드 중...</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script id="page-data" type="application/json">{"code": {{ code|tojson }}}</script>
<script src="{{ static_v('js/symbol_page.js') }}"></script>
{% endblock %}
