{% extends "base.html" %}
{% block title %}{{ code }} — Money Milestone{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/calculator.css') }}?v=20260611ui">
<style>
/* main-content 기본 grid 무력화 — symbol 페이지 전체 너비 사용 */
.main-content { display: block !important; padding: 0 !important; }
.symbol-wrap { max-width: 100%; padding: 20px 28px; }

/* 헤더 */
.symbol-header {
  display: flex; align-items: center; justify-content: space-between;
  background:var(--card); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 16px 24px; margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.symbol-header-left { display: flex; align-items: center; gap: 16px; }
.symbol-badge {
  padding: 4px 12px; border-radius: 8px;
  font-size: 0.75rem; font-weight: 700;
  background:var(--blue-pale); color:var(--blue); flex-shrink: 0;
}
.symbol-badge.kr     { background:var(--green-pale); color:var(--green); }
.symbol-badge.crypto { background:var(--gold-pale); color:var(--gold-deep); }
.symbol-name { font-size: 1.4rem; font-weight: 900; color: var(--text); }
.symbol-code { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
.symbol-header-right { text-align: right; }
.symbol-price { font-size: 2rem; font-weight: 900; color: var(--text); }
.symbol-change { font-size: 0.95rem; font-weight: 700; margin-top: 2px; }
.symbol-change.up   { color:var(--green); }
.symbol-change.down { color:var(--red); }
.symbol-date { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }

/* 2열 본문 */
.symbol-body {
  display: grid;
  grid-template-columns: 6fr 4fr;
  gap: 16px;
  align-items: start;
}

/* 차트 카드 — 높이 전체 채우기 */
.chart-card {
  display: flex;
  flex-direction: column;
}
.chart-canvas-wrap {
  height: 530px;
  position: relative;
}

/* 오른쪽 컬럼 — 스택 전체 높이 채우기 */
.symbol-right-col {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.symbol-right-col .symbol-card:last-child {
  flex: 1;
  overflow-y: auto;
}

/* 카드 */
.symbol-card {
  background:var(--card); border-radius: 14px;
  border: 1.5px solid var(--border); padding: 20px;
  box-shadow: var(--shadow);
}
.symbol-card + .symbol-card { margin-top: 16px; }
.symbol-card-title {
  font-size: 0.88rem; font-weight: 700; color: var(--text);
  margin-bottom: 14px;
}

/* 기간 탭 */
.period-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.period-tab {
  padding: 5px 14px; border-radius: 7px;
  font-size: 0.8rem; font-weight: 600;
  border: 1.5px solid var(--border);
  background:var(--card); color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
}
.period-tab.active { background: var(--blue); color: white; border-color: var(--blue); }

/* 지표 그리드 */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.stat-item { padding: 12px; background: var(--bg); border-radius: 10px; }
.stat-label { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 4px; }
.stat-value { font-size: 0.95rem; font-weight: 700; color: var(--text); }

/* 배당 테이블 */
.div-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.div-table th {
  background: var(--bg); padding: 7px 10px;
  color: var(--text-muted); font-weight: 600;
  text-align: left; border-bottom: 1.5px solid var(--border);
}
.div-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
.div-table tr:last-child td { border-bottom: none; }

/* 빈 상태 */
.symbol-empty {
  display: flex; align-items: center; justify-content: center;
  height: 200px; color: var(--text-muted); font-size: 0.9rem;
  border: 2px dashed var(--border); border-radius: 12px;
}

@media (max-width: 900px) {
  .symbol-wrap { padding: 14px 12px; }
  .symbol-body { grid-template-columns: 1fr; }
  .symbol-header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .symbol-header-right { text-align: left; }
  .symbol-price { font-size: 1.5rem; }
  .chart-canvas-wrap { height: 320px; }
}
</style>
{% endblock %}

{% block content %}
<div class="symbol-wrap">
  <div id="symbolContent">
    <div class="symbol-empty">⏳ 데이터 로드 중...</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const CODE = "{{ code }}";

function fmtPrice(v, currency) {
  if (v === null || v === undefined) return '—';
  if (currency === 'KRW') return '₩' + Math.round(v).toLocaleString();
  return '$' + v.toFixed(2);
}

function fmtDiv(v, currency) {
  if (!v) return '—';
  if (currency === 'KRW') return '₩' + Math.round(v).toLocaleString();
  return '$' + parseFloat(v).toFixed(4);
}

let chartInst = null;
let allData   = null;

async function loadSymbol() {
  const res  = await fetch(`/api/symbol/${CODE}`);
  const data = await res.json();
  if (data.error) {
    document.getElementById('symbolContent').innerHTML =
      `<div class="symbol-empty">종목을 찾을 수 없습니다: ${CODE}</div>`;
    return;
  }
  allData = data;
  renderPage(data);
}

function renderPage(data) {
  const cur    = data.current_price;
  const prev   = data.prev_price;
  const chg    = prev ? cur - prev : 0;
  const chgPct = prev ? (chg / prev * 100) : 0;
  const isUp   = chg >= 0;
  const curr   = data.currency;
  const isKR     = data.country === 'KR';
  const isCrypto = data.category === 'CRYPTO';
  const isIndex  = data.is_index || data.category === '금현물';
  const badgeLabel = isIndex  ? '지수/선물'
                   : isCrypto ? 'CRYPTO'
                   : isKR     ? 'KR ETF' : 'US ETF';
  const badgeClass = isIndex  ? ''
                   : isCrypto ? 'crypto'
                   : isKR     ? 'kr' : '';

  document.getElementById('symbolContent').innerHTML = `
    <!-- 상단 헤더 (full width) -->
    <div class="symbol-header">
      <div class="symbol-header-left">
        <span class="symbol-badge ${badgeClass}">${badgeLabel}</span>
        <div>
          <div class="symbol-name">${data.name}</div>
          <div class="symbol-code">${data.code}</div>
        </div>
      </div>
      <div class="symbol-header-right">
        <div class="symbol-price">${fmtPrice(cur, curr)}</div>
        <div class="symbol-change ${isUp ? 'up' : 'down'}">
          ${isUp ? '▲' : '▼'} ${fmtPrice(Math.abs(chg), curr)} (${Math.abs(chgPct).toFixed(2)}%)
        </div>
        <div class="symbol-date">${data.last_date} 기준</div>
      </div>
    </div>

    <!-- 2열 본문 -->
    <div class="symbol-body">
      <!-- 왼쪽: 차트 -->
      <div class="symbol-card chart-card">
        <div class="symbol-card-title">📈 가격 차트</div>
        <div class="period-tabs">
          <button class="period-tab active">1개월</button>
          <button class="period-tab">3개월</button>
          <button class="period-tab">1년</button>
          <button class="period-tab">전체</button>
        </div>
        <div class="chart-canvas-wrap">
          <canvas id="priceChart"></canvas>
        </div>
      </div>

      <!-- 오른쪽: 지표 + 배당 -->
      <div class="symbol-right-col">
        <div class="symbol-card">
          <div class="symbol-card-title">📊 핵심 지표</div>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-label">52주 최고</div>
              <div class="stat-value">${fmtPrice(data.high_52w, curr)}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">52주 최저</div>
              <div class="stat-value">${fmtPrice(data.low_52w, curr)}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">배당수익률</div>
              <div class="stat-value">${data.div_yield ? data.div_yield.toFixed(2) + '%' : '—'}</div>
            </div>
            ${(!isCrypto && !isIndex) ? `
            <div class="stat-item">
              <div class="stat-label">운용사</div>
              <div class="stat-value" style="font-size:0.82rem;">${data.issuer || '—'}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">보수율</div>
              <div class="stat-value">${data.expense_ratio ? (data.expense_ratio * 100).toFixed(2) + '%' : '—'}</div>
            </div>
            <div class="stat-item" style="grid-column:1/-1;">
              <div class="stat-label">카테고리</div>
              <div class="stat-value" style="font-size:0.82rem;">${data.category || '—'}</div>
            </div>` : ''}
            ${data.aum ? `
            <div class="stat-item" style="grid-column:1/-1;">
              <div class="stat-label">AUM</div>
              <div class="stat-value">$${(data.aum / 1e9).toFixed(1)}B</div>
            </div>` : ''}
          </div>
        </div>

        ${!isIndex ? `
        <div class="symbol-card">
          <div class="symbol-card-title">💰 배당 내역</div>
          ${data.dividends && data.dividends.length ? `
          <table class="div-table">
            <thead><tr><th>배당일</th><th>주당 배당금</th></tr></thead>
            <tbody>
              ${data.dividends.map(d => `
                <tr>
                  <td>${d.date}</td>
                  <td>${fmtDiv(d.dividend, curr)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>` : '<div style="color:var(--text-muted);font-size:0.85rem;padding:8px;">배당 데이터 없음</div>'}
        </div>` : ''}
      </div>
    </div>
  `;

  renderChart(data.prices, '1M');
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('period-tab')) {
    const period = e.target.textContent === '1개월' ? '1M'
                 : e.target.textContent === '3개월' ? '3M'
                 : e.target.textContent === '1년'   ? '1Y' : 'ALL';
    document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    if (allData) renderChart(allData.prices, period);
  }
});

function renderChart(prices, period) {
  if (!prices || !prices.length) return;
  const now   = new Date(prices[prices.length - 1].date);
  const cutoff = new Date(now);
  if      (period === '1M')  cutoff.setMonth(cutoff.getMonth() - 1);
  else if (period === '3M')  cutoff.setMonth(cutoff.getMonth() - 3);
  else if (period === '1Y')  cutoff.setFullYear(cutoff.getFullYear() - 1);
  else                        cutoff.setFullYear(1900);

  const filtered = prices.filter(p => new Date(p.date) >= cutoff);
  const labels   = filtered.map(p => p.date);
  const vals     = filtered.map(p => p.close);

  const isUp = vals.length > 1 && vals[vals.length - 1] >= vals[0];
  const color = isUp ? '#2E7D32' : '#C62828';
  const fill  = isUp ? 'rgba(46,125,50,0.08)' : 'rgba(198,40,40,0.08)';

  if (chartInst) chartInst.destroy();
  const ctx = document.getElementById('priceChart').getContext('2d');
  chartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: vals,
        borderColor: color, borderWidth: 2,
        backgroundColor: fill,
        fill: true, pointRadius: 0, tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => allData.currency === 'KRW'
          ? '₩' + Math.round(ctx.parsed.y).toLocaleString()
          : '$' + ctx.parsed.y.toFixed(2) }
      }},
      scales: {
        x: { ticks: { maxTicksLimit: 8, font: { size: 10 }, color: '#90A4AE' }, grid: { display: false } },
        y: { ticks: { font: { size: 10 }, color: '#90A4AE' }, grid: { color: MM_CHART_GRID } }
      }
    }
  });
}

loadSymbol();
</script>
{% endblock %}
